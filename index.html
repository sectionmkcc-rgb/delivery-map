<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>外送避雷地圖 (法律防護版)</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        /* 基礎設定 */
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: "Microsoft JhengHei", Arial, sans-serif; overflow: hidden; }
        .container { display: flex; height: 100vh; width: 100vw; position: relative; }
        #map { flex-grow: 1; height: 100%; width: 100%; z-index: 1; }
        #map.add-mode { cursor: crosshair; }

        /* 載入遮罩 */
        #loading-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8); z-index: 9999; justify-content: center; align-items: center;
            font-size: 20px; font-weight: bold; color: #333; flex-direction: column;
        }
        .spinner {
            border: 6px solid #f3f3f3; border-top: 6px solid #4285F4; border-radius: 50%;
            width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 搜尋欄 */
        .search-wrapper { position: absolute; top: 15px; left: 15px; z-index: 800; width: 350px; max-width: 85%; display: flex; flex-direction: column; }
        .search-box { display: flex; align-items: center; background: white; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.3); padding: 0 15px; height: 48px; }
        .search-icon { color: #555; font-size: 20px; margin-right: 10px; }
        #search-input { flex: 1; border: none; outline: none; font-size: 16px; height: 100%; background: transparent; }
        .clear-icon { cursor: pointer; color: #999; font-size: 18px; display: none;}
        .search-results { background: white; margin-top: 5px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); max-height: 350px; overflow-y: auto; display: none; }

        /* 右側側邊欄 */
        #sidebar {
            width: 350px; max-width: 100%; height: 100%; background: #ffffff; box-shadow: -2px 0 5px rgba(0,0,0,0.1);
            position: absolute; right: -360px; top: 0; z-index: 1000; transition: right 0.3s ease-in-out; overflow-y: auto; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column;
        }
        #sidebar.active { right: 0; }
        .close-btn { align-self: flex-end; cursor: pointer; font-size: 28px; color: #888; background: none; border: none; padding: 0; }
        
        /* 側邊欄標籤樣式 */
        .tag-pill { display: inline-block; padding: 4px 10px; border-radius: 4px; background: #eee; margin: 2px; font-size: 14px; border: 1px solid #ddd; }

        /* 按鈕與表單 */
        #add-spot-btn { position: absolute; bottom: 30px; left: 30px; z-index: 800; padding: 15px 25px; background-color: #333; color: white; border-radius: 50px; font-size: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); border: none; cursor: pointer; }
        #add-spot-btn.active { background-color: #ff9800; color: #000; font-weight: bold;}
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; justify-content: center; align-items: center; }
        .modal { background: white; padding: 25px; border-radius: 12px; width: 90%; max-width: 400px; box-shadow: 0 5px 20px rgba(0,0,0,0.4); max-height: 90vh; overflow-y: auto; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        
        .btn { padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; flex: 1; text-align: center; color: white; font-size: 16px;}
        .btn-save { background-color: #28a745; }
        .btn-cancel { background-color: #6c757d; }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div class="spinner"></div>
    <div id="loading-text">連線至雲端資料庫...</div>
</div>

<div class="container">
    <div id="map"></div>
    
    <div class="search-wrapper">
        <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" id="search-input" placeholder="搜尋大樓、社區或地址..." autocomplete="off">
            <span class="clear-icon" id="clear-search" onclick="clearSearch()">×</span>
        </div>
        <div class="search-results" id="search-results"></div>
    </div>

    <button id="add-spot-btn" onclick="toggleAddMode()">＋ 手動標記位置</button>
    
    <div id="sidebar">
        <button class="close-btn" onclick="closeSidebar()">×</button>
        <div id="sidebar-content"></div>
        <div style="margin-top:20px; display:flex; gap:10px;">
            <button class="btn" style="background:#4285F4;" onclick="navigateToSpot()">🚗 導航</button>
            <button class="btn" style="background:#6c757d;" onclick="editCurrentSpot()">📝 編輯</button>
            <button class="btn" style="background:#dc3545;" onclick="deleteCurrentSpot()">🗑️ 刪除</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modal-overlay">
    <div class="modal">
        <h3 id="modal-title">新增送餐筆記</h3>
        <div class="form-group">
            <label>地點名稱 (社區/店名) <span style="color:red">*</span></label>
            <input type="text" id="input-name" placeholder="例如：帝寶B棟 (勿填完整地址)">
        </div>
        <div class="form-group">
            <label>快速標籤 (法律防護)</label>
            <div id="tag-container" style="display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px;">
                </div>
            <input type="hidden" id="input-tags">
        </div>
        <div class="form-group">
            <label>分類</label>
            <select id="input-category">
                <option value="easy">🟢 友善好送</option>
                <option value="security">🟡 需換證 / 警衛嚴格</option>
                <option value="maze">🟠 迷宮 / 入口難找</option>
                <option value="ticket">🔴 科技執法 / 易開單</option>
                <option value="warning">🟣 特殊備註</option>
            </select>
        </div>
        <div class="form-group">
            <label>補充備註 (請勿包含個資/謾罵)</label>
            <textarea id="input-review" rows="3" placeholder="例如：機車停全家旁巷子進去較快"></textarea>
        </div>
        <div class="modal-buttons" style="display:flex; gap:10px;">
            <button class="btn btn-cancel" onclick="closeModal()">取消</button>
            <button class="btn btn-save" onclick="saveDataFromModal()">💾 儲存</button>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const GOOGLE_SHEETS_URL = "https://script.google.com/macros/s/AKfycbzbEqUv-EmrfY5CB6Dk8kV48JLuQz9t-EhZvnGwOhLesJaLWZeVlyuxgm6_yobDc01vUg/exec";

    // --- 1. 定義快速標籤 ---
    const SAFE_TAGS = [
        "⏳ 取餐等候長", "👮 有檢舉達人", "🪵 沒電梯", "🪜 高樓層", "🛵 門口好停車", 
        "🪪 需押證件", "🦮 有狗注意", "🗺️ 導航不準", "🔋 門口有電站"
    ];

    var map = L.map('map', { zoomControl: false }).setView([25.0478, 121.5170], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let spots = [];
    let markersLayer = L.layerGroup().addTo(map);
    let isAddMode = false;
    let tempLatLng = null;
    let editingId = null;
    let selectedTags = [];

    // 初始化標籤按鈕
    function initTagButtons() {
        const container = document.getElementById('tag-container');
        container.innerHTML = '';
        SAFE_TAGS.forEach(tag => {
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.innerText = tag;
            btn.style.padding = '5px 10px';
            btn.style.border = '1px solid #ccc';
            btn.style.borderRadius = '20px';
            btn.style.background = '#f9f9f9';
            btn.style.cursor = 'pointer';
            btn.onclick = () => toggleTag(tag, btn);
            container.appendChild(btn);
        });
    }

    function toggleTag(tag, btn) {
        if (selectedTags.includes(tag)) {
            selectedTags = selectedTags.filter(t => t !== tag);
            btn.style.background = '#f9f9f9';
            btn.style.color = '#333';
        } else {
            selectedTags.push(tag);
            btn.style.background = '#4285F4';
            btn.style.color = 'white';
        }
    }

    async function loadData() {
        document.getElementById('loading-overlay').style.display = 'flex';
        try {
            const response = await fetch(GOOGLE_SHEETS_URL);
            spots = await response.json();
            renderMarkers();
        } catch (e) { console.error("載入失敗", e); }
        document.getElementById('loading-overlay').style.display = 'none';
    }

    function renderMarkers() {
        markersLayer.clearLayers();
        const colors = { easy:'#28a745', security:'#ffc107', maze:'#fd7e14', ticket:'#dc3545', warning:'#6f42c1' };
        spots.forEach(spot => {
            const marker = L.circleMarker(spot.coords, {
                color: 'white', weight: 2, fillColor: colors[spot.category] || '#28a745', fillOpacity: 0.9, radius: 12
            }).addTo(markersLayer);
            marker.on('click', () => showSidebar(spot));
        });
    }

    function showSidebar(data) {
        editingId = data.id;
        const sidebar = document.getElementById('sidebar');
        const tagsHtml = (data.tags || []).map(t => `<span class="tag-pill">${t}</span>`).join('');
        document.getElementById('sidebar-content').innerHTML = `
            <h2>${data.name}</h2>
            <div style="margin-bottom:15px;">${tagsHtml}</div>
            <div style="background:#f5f5f5; padding:15px; border-radius:8px;">${data.review || "無補充備註"}</div>
        `;
        sidebar.classList.add('active');
    }

    function openModal(id = null) {
        selectedTags = [];
        initTagButtons();
        document.getElementById('modal-overlay').style.display = 'flex';
        if (id) {
            const spot = spots.find(s => s.id === id);
            document.getElementById('input-name').value = spot.name;
            document.getElementById('input-category').value = spot.category;
            document.getElementById('input-review').value = spot.review;
            // 恢復選中標籤
            selectedTags = spot.tags || [];
            const buttons = document.querySelectorAll('#tag-container button');
            buttons.forEach(btn => {
                if (selectedTags.includes(btn.innerText)) {
                    btn.style.background = '#4285F4';
                    btn.style.color = 'white';
                }
            });
        }
    }

    async function saveDataFromModal() {
        const name = document.getElementById('input-name').value;
        if (!name) return alert("請輸入名稱");

        const newData = {
            id: editingId || Date.now().toString(),
            name: name,
            coords: editingId ? spots.find(s=>s.id===editingId).coords : tempLatLng,
            category: document.getElementById('input-category').value,
            tags: selectedTags,
            review: document.getElementById('input-review').value
        };

        if (editingId && spots.some(s => s.id === editingId)) {
            spots = spots.map(s => s.id === editingId ? newData : s);
        } else {
            spots.push(newData);
        }

        closeModal();
        renderMarkers();
        
        // POST 到 Google Sheets
        await fetch(GOOGLE_SHEETS_URL, { method: "POST", body: JSON.stringify(spots) });
    }

    function toggleAddMode() {
        isAddMode = !isAddMode;
        document.getElementById('add-spot-btn').classList.toggle('active');
    }

    map.on('click', e => {
        if (isAddMode) {
            tempLatLng = [e.latlng.lat, e.latlng.lng];
            editingId = null;
            openModal();
            toggleAddMode();
        } else {
            closeSidebar();
        }
    });

    function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
    function closeSidebar() { document.getElementById('sidebar').classList.remove('active'); }
    function editCurrentSpot() { if(editingId) openModal(editingId); }

    loadData();
</script>
</body>
</html>
